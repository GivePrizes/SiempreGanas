<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" type="image/png" href="../assets/imagenes/mathome-favicon.png">
  <title>Redirigiendo a la ruleta - Mathome</title>
  <link rel="stylesheet" href="../assets/css/common.css?v=20260225c">
  <link rel="stylesheet" href="../assets/css/participant.css?v=20260331a">
</head>
<body>
  <main class="main-container sorteo-page">
    <section class="sorteo-card-premium">
      <p class="sorteo-card__eyebrow">Sala unificada</p>
      <h1 class="sorteo-title">El chat ahora vive dentro de la ruleta</h1>
      <p class="sorteo-subtitle">
        Estamos llevándote a la única sala oficial para evitar rutas duplicadas.
      </p>
      <button id="btnContinue" type="button" class="btn btn-primary">Ir ahora</button>
    </section>
  </main>

  <script>
    (function redirectToLiveRoom() {
      const params = new URLSearchParams(window.location.search);
      const sorteoId = params.get('id') || params.get('sorteo') || params.get('sorteoId');
      const target = sorteoId
        ? `ruleta-live.html?id=${encodeURIComponent(sorteoId)}`
        : 'dashboard.html';

      document.getElementById('btnContinue')?.addEventListener('click', function () {
        window.location.href = target;
      });

      window.setTimeout(function () {
        window.location.replace(target);
      }, 150);
    })();
  </script>
</body>
</html>
