<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" type="image/png" href="../assets/imagenes/mathome-favicon.png">
  <title>Redirigiendo a la ruleta - Mathome</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(960px 520px at 18% -10%, rgba(59,130,246,.24), transparent 58%),
        radial-gradient(860px 500px at 92% 0%, rgba(56,189,248,.14), transparent 56%),
        #050b16;
      color: #eaf2ff;
    }

    .redirect-shell {
      width: min(100%, 420px);
      border-radius: 22px;
      padding: 24px 22px;
      border: 1px solid rgba(146,193,255,.24);
      background: linear-gradient(180deg, rgba(24,43,76,.72), rgba(11,21,38,.92));
      box-shadow: 0 18px 40px rgba(2,8,20,.58);
    }

    .redirect-eyebrow {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #93c5fd;
    }

    .redirect-title {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      color: #dbeafe;
    }

    .redirect-copy {
      margin: 12px 0 0;
      color: #b8cae6;
      line-height: 1.55;
    }

    .redirect-btn {
      margin-top: 18px;
      width: 100%;
      min-height: 48px;
      border: 1px solid rgba(147,197,253,.42);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(96,165,250,.95), rgba(59,130,246,.92));
      color: #eef6ff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(59,130,246,.26);
    }
  </style>
</head>
<body>
  <main class="redirect-shell">
    <section>
      <p class="redirect-eyebrow">Sala unificada</p>
      <h1 class="redirect-title">El chat ahora vive dentro de la ruleta</h1>
      <p class="redirect-copy">
        Estamos llevándote a la unica sala oficial para evitar rutas duplicadas.
      </p>
      <button id="btnContinue" type="button" class="redirect-btn">Ir ahora</button>
    </section>
  </main>

  <script>
    (function redirectToLiveRoom() {
      const params = new URLSearchParams(window.location.search);
      const sorteoId = params.get('id') || params.get('sorteo') || params.get('sorteoId');
      const target = sorteoId
        ? `ruleta-live.html?id=${encodeURIComponent(sorteoId)}`
        : 'dashboard.html';

      document.getElementById('btnContinue')?.addEventListener('click', function () {
        window.location.href = target;
      });

      window.setTimeout(function () {
        window.location.replace(target);
      }, 150);
    })();
  </script>
</body>
</html>
