﻿<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" type="image/png" href="../assets/imagenes/mathome-favicon.png">
  <title>Ronda en vivo — Mathome</title>

  <script src="../assets/js/theme-init.js?v=20260401b"></script>
  <link rel="stylesheet" href="../assets/css/common.css?v=20260225c">
  <link rel="stylesheet" href="../assets/css/ruleta-live.css?v=20260415a">
  <link rel="stylesheet" href="../assets/js/chat/chat.css?v=20260331a">
  <link rel="stylesheet" href="../assets/css/theme.css?v=20260412b">
</head>

<body>
  <main class="wrap">
    <header class="top">
    <div>
        <h1 class="title">Ronda en vivo</h1>
        <p id="subtitle" class="muted">Conectando…</p>
    </div>

    <div class="top-actions">
        <button id="btnBack" class="btnBack" type="button" aria-label="Volver">
        <span class="btn-ico">←</span>
        <span class="btn-label">Volver</span>
        </button>
        <button id="btnBuyAnother" class="btnBack" type="button" aria-label="Comprar otro numero">
        <span class="btn-ico">+</span>
        <span class="btn-label">Comprar otro</span>
        </button>
        <div id="badgeEstado" class="badge">—</div>
    </div>
    </header>


    <!-- Countdown -->
    <section class="card" id="countdownCard">
      <div class="countdownRow">
        <div>
          <div class="label">ACTIVACIÓN</div>
          <div id="countdown" class="countdown">--:--</div>
        </div>

        <div class="progress" aria-label="Progreso hacia la ronda">
          <div id="progressBar" class="progressBar"></div>
        </div>
      </div>

      <p class="muted small" id="countdownHint">—</p>
    </section>

    <!-- Wheel -->
    <section class="card wheelCard">
      <div class="wheelWrap">
        <div class="pointer" aria-hidden="true"></div>
        <canvas id="wheel" width="520" height="520" aria-label="Ronda"></canvas>
      </div>

      <div id="result" class="result hidden" aria-live="polite"></div>
    </section>

    <!-- Mis números -->
    <section class="card numbersCard">
      <div class="salaHeader">
        <div>
          <h2 class="salaTitle">Números comprados</h2>
          <p class="muted small">Se muestran los números aprobados a medida que el sorteo se va llenando</p>
        </div>
        <span id="numbersCount" class="salaBadge">0</span>
      </div>

      <div id="numbersList" class="numbersList" aria-live="polite"></div>
    </section>

    <!-- Chat en vivo -->
    <section class="card chatCard">
      <div class="salaHeader">
        <div>
          <h2 class="salaTitle">Chat en vivo</h2>
          <p class="muted small">Sala oficial de la ruleta: aquí se concentra toda la conversación</p>
        </div>
        <span class="salaBadge">En vivo</span>
      </div>

      <div id="chatContainer">
        <button id="chatNewBtn" class="chat-new-btn hidden" type="button">Nuevos mensajes ↓</button>
        <div id="chatBody" class="chat-messages"></div>
        <div class="chat-input-wrap">
          <input id="chatInput" type="text" maxlength="120" placeholder="Escribe aquí..." />
          <button id="chatSend" type="button">
            <span class="btn-ico">➤</span>
            <span class="btn-label">Enviar</span>
          </button>
        </div>
        <p id="chatHint" class="chat-hint"></p>
      </div>
    </section>

    <!-- Overlay 3-2-1 -->
    <div id="overlay" class="overlay hidden" aria-hidden="true">
      <div id="overlayNum" class="overlayNum">3</div>
    </div>
  </main>

  <script src="../assets/js/app-config.js"></script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/theme.js?v=20260401b"></script>
  <script type="module" src="../assets/js/participante/ruleta-live-chat.js?v=20260415b"></script>
  <script src="../assets/js/participante/ruleta-live.js?v=20260415d"></script>
    <!-- 🔊 Sonido resultado destacado -->
  <audio id="audioWin" src="../assets/sound/sonidoWin.mp3" preload="auto"></audio>

</body>
</html>
