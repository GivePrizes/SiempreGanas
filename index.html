<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="assets/imagenes/mathome-favicon.png">
  <title>SiempreGana — Redirigiendo...</title>
  <script src="assets/js/theme-init.js?v=20260401b"></script>
  <link rel="stylesheet" href="assets/css/theme.css?v=20260401b">
</head>
<body>
  <script>
    const token = localStorage.getItem('token');
    const user  = localStorage.getItem('user');

    if (token && user) {
      const info = JSON.parse(user);
      location.href = info.rol === "admin"
        ? "admin/panel.html"
        : "participante/dashboard.html";
    } else {
      location.href = "login.html";
    }
  </script>
</body>
</html>
